<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maç Sonuçları – Nadir Gençlik FK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; color: #111; }

    nav {
      background: #0a1a3d;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 60px;
      border-bottom: 3px solid #fff;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-circle {
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #0a1a3d;
    }
    .logo-text { color: #fff; font-size: 15px; font-weight: 600; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .page-header {
      background: #0a1a3d; color: #fff;
      padding: 2.5rem 2rem 2rem; text-align: center;
    }
    .page-header h1 { font-size: 26px; font-weight: 700; }
    .page-header p { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 6px; }

    .content { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }

    .section-title {
      font-size: 18px; font-weight: 700; color: #0a1a3d;
      margin-bottom: 1.25rem; padding-bottom: 0.75rem;
      border-bottom: 3px solid #0a1a3d; display: inline-block;
    }

    .fixture-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 3rem; }
    .fixture-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: #fff;
      border: 1px solid #e0e0e0; border-radius: 10px;
    }
    .fixture-teams { font-size: 15px; font-weight: 600; color: #111; }
    .fixture-vs { font-size: 12px; color: #888; font-weight: 400; margin: 0 8px; }
    .fixture-date { font-size: 12px; color: #888; margin-top: 4px; }
    .fixture-result {
      font-size: 17px; font-weight: 700; color: #0a1a3d;
      background: #e8eef7; border-radius: 6px; padding: 5px 16px;
    }
    .fixture-upcoming {
      font-size: 13px; color: #888;
      background: #f5f5f5; border-radius: 6px; padding: 5px 14px;
    }

    /* Boş alan placeholder - doldurulacak maçlar için */
    .empty-note {
      text-align: center; padding: 3rem 1rem;
      color: #aaa; font-size: 15px;
      background: #fff; border: 2px dashed #e0e0e0;
      border-radius: 12px;
    }
    .empty-note strong { display: block; font-size: 18px; color: #ccc; margin-bottom: 8px; }

    footer {
      background: #0a1a3d; color: rgba(255,255,255,0.6);
      text-align: center; padding: 1.75rem; font-size: 13px;
    }
    footer span { color: #fff; font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <div class="logo-circle">NGF</div>
      <div class="logo-text">Nadir Gençlik FK</div>
    </a>
    <div class="nav-links">
      <a href="index.html">Anasayfa</a>
      <a href="#">Videolar</a>
      <a href="mac-sonuclari.html" class="active">Maçlar</a>
      <a href="kadro.html">Kadro</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>Maç Sonuçları & Fikstür</h1>
    <p>2024–2025 Sezonu</p>
  </div>

  <div class="content">

    <div class="section-title">Geçmiş Maçlar</div>
    <div class="fixture-list">
      <!-- BURAYA MAÇ SONUÇLARI EKLENECEKTİR -->
      <div class="empty-note">
        <strong>Henüz maç eklenmedi</strong>
        Maç sonuçları burada görünecek.
      </div>
    </div>

    <div class="section-title">Yaklaşan Maçlar</div>
    <div class="fixture-list">
      <!-- BURAYA GELECEK MAÇLAR EKLENECEKTİR -->
      <div class="empty-note">
        <strong>Fikstür bekleniyor</strong>
        Yaklaşan maçlar burada görünecek.
      </div>
    </div>

  </div>

  <footer>
    <span>Nadir Gençlik FK</span> &nbsp;·&nbsp; Maç Sonuçları 2024–2025
  </footer>

</body>
</html>
